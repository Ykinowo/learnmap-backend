<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>发布校方通知</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <h2>发布校方通知</h2>
    <form method="post" action="/admin/publish" enctype="multipart/form-data">
        <div class="mb-3">
            <label>标题（可选）</label>
            <input type="text" name="title" class="form-control">
        </div>
        <div class="mb-3">
            <label>内容 *</label>
            <textarea name="content" rows="5" class="form-control" required></textarea>
        </div>
        <div class="mb-3">
            <label>地点名称 *</label>
            <input type="text" name="locationName" class="form-control" required>
        </div>
        <div class="mb-3">
            <label>纬度</label>
            <input type="text" name="latitude" class="form-control" value="38.020615">
        </div>
        <div class="mb-3">
            <label>经度</label>
            <input type="text" name="longitude" class="form-control" value="114.600033">
        </div>
        <div class="mb-3">
            <label>标签（逗号分隔）</label>
            <input type="text" name="tags" class="form-control">
        </div>
        <div class="mb-3">
            <label>图片上传（可选）</label>
            <input type="file" name="imageFile" class="form-control">
        </div>
        <div class="form-check mb-3">
            <input type="checkbox" name="isAnonymous" class="form-check-input">
            <label class="form-check-label">匿名发布</label>
        </div>
        <button type="submit" class="btn btn-primary">发布</button>
        <a href="/admin/dashboard" class="btn btn-secondary">返回</a>
    </form>
    <div th:if="${param.success}" class="alert alert-success mt-3">发布成功！</div>
    <div th:if="${param.error}" class="alert alert-danger mt-3" th:text="${param.error[0]}"></div>
</div>
</body>
</html>
