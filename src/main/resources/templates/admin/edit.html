<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>编辑通知</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <h2>编辑校方通知</h2>
    <form method="post" action="/admin/posts/edit">
        <input type="hidden" name="id" th:value="${post.id}">
        <div class="mb-3">
            <label>标题</label>
            <input type="text" name="title" class="form-control" th:value="${post.title}">
        </div>
        <div class="mb-3">
            <label>内容</label>
            <textarea name="content" rows="5" class="form-control" th:text="${post.content}" required></textarea>
        </div>
        <div class="mb-3">
            <label>地点名称</label>
            <input type="text" name="locationName" class="form-control" th:value="${post.locationName}" required>
        </div>
        <div class="mb-3">
            <label>纬度</label>
            <input type="text" name="latitude" class="form-control" th:value="${post.latitude}">
        </div>
        <div class="mb-3">
            <label>经度</label>
            <input type="text" name="longitude" class="form-control" th:value="${post.longitude}">
        </div>
        <div class="mb-3">
            <label>标签（逗号分隔）</label>
            <input type="text" name="tags" class="form-control" th:value="${post.tags}">
        </div>
        <div class="form-check mb-3">
            <input type="checkbox" name="isAnonymous" class="form-check-input" th:checked="${post.isAnonymous}">
            <label class="form-check-label">匿名发布</label>
        </div>
        <button type="submit" class="btn btn-primary">保存</button>
        <a href="/admin/posts" class="btn btn-secondary">取消</a>
    </form>
</div>
</body>
</html>
