<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>管理端</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <h2>管理端首页</h2>
    <div class="row">
        <div class="col-md-4">
            <div class="card">
                <div class="card-body">
                    <h5 class="card-title">发布校方通知</h5>
                    <p class="card-text">发布新的校方通知，将出现在App的校方通知板块。</p>
                    <a href="/admin/publish" class="btn btn-primary">去发布</a>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card">
                <div class="card-body">
                    <h5 class="card-title">通知列表</h5>
                    <p class="card-text">查看、编辑或删除已发布的校方通知。</p>
                    <a href="/admin/posts" class="btn btn-primary">查看列表</a>
                </div>
            </div>
        </div>
    </div>
    <hr>
    <a href="/admin/logout" class="btn btn-secondary">退出登录</a>
</div>
</body>
</html>
